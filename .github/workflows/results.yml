name: Mise à jour des résultats
on:
  schedule:
    - cron: '*/10 * * * *'   # toutes les 10 min (heure UTC)
  workflow_dispatch:          # bouton "Run workflow" manuel
permissions:
  contents: write
concurrency:
  group: results
  cancel-in-progress: true
jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Récupérer les scores
        run: node fetch-results.mjs
      - name: Publier results.json si modifié
        run: |
          if ! git diff --quiet -- results.json; then
            git config user.name "results-bot"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add results.json
            git commit -m "résultats $(date -u +%FT%TZ)"
            git push
          else
            echo "Aucun changement."
          fi
